<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nepting Copy Helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-icon {
      width: 24px;
      height: 24px;
      background: #89b4fa;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 14px;
      height: 14px;
      fill: #1e1e2e;
    }

    .header-title {
      font-weight: 600;
      font-size: 13px;
      color: #cdd6f4;
    }

    .header-sub {
      font-size: 10px;
      color: #6c7086;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #313244;
      margin-bottom: 14px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: #181825;
      border-radius: 8px;
      border: 1px solid #313244;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .dot.idle    { background: #45475a; }
    .dot.waiting { background: #f9e2af; box-shadow: 0 0 6px #f9e2af88; }
    .dot.ready   { background: #a6e3a1; box-shadow: 0 0 6px #a6e3a188; }

    .status-text {
      font-size: 11.5px;
      color: #a6adc8;
      line-height: 1.3;
    }

    #copy-btn {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    #copy-btn:disabled {
      background: #313244;
      color: #45475a;
      cursor: not-allowed;
    }

    #copy-btn:not(:disabled) {
      background: #89b4fa;
      color: #1e1e2e;
    }

    #copy-btn:not(:disabled):hover {
      background: #b4d0ff;
    }

    #copy-btn:not(:disabled):active {
      transform: scale(0.97);
    }

    .feedback {
      font-size: 11px;
      color: #a6e3a1;
      text-align: center;
      margin-top: 9px;
      height: 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 2h8a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1zm0 1v10h8V3H4zm1 2h6v1H5V5zm0 2h6v1H5V7zm0 2h4v1H5V9z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Nepting Copy Helper</div>
      <div class="header-sub">Row → CSV clipboard</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status">
    <div class="dot idle" id="dot"></div>
    <span class="status-text" id="status-text">
        En attente d'une ligne de tableau sélectionnée…
    </span>
  </div>

  <button id="copy-btn" disabled>Copier la ligne</button>
  <div class="feedback" id="feedback">✓ Ajouté au presse papier!</div>

  <script src="popup.js"></script>
</body>
</html>
